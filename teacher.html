<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Admin - Reflection Logs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div id="admin-login" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow-md text-center">
        <h1 class="text-2xl font-bold mb-6 text-blue-800">Teacher Dashboard</h1>
        <input type="password" id="admin-pass" placeholder="Admin Password" class="w-full border p-3 rounded mb-4 outline-none focus:ring-2 focus:ring-blue-500">
        <button onclick="checkAdmin()" class="w-full bg-blue-600 text-white font-bold py-3 rounded hover:bg-blue-700 transition">Enter Dashboard</button>
    </div>

    <div id="admin-dashboard" class="hidden max-w-6xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <div class="flex flex-col md:flex-row justify-between items-center border-b pb-6 mb-6 gap-4">
            <h2 class="text-3xl font-extrabold text-gray-800">Student Logs</h2>
            <button onclick="exportFilteredToCSV()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-bold shadow transition">
                📥 Export Current View to CSV
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 p-4 bg-blue-50 rounded-lg border border-blue-100">
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Filter by Student ID</label>
                <input type="text" id="filter-id" placeholder="e.g. 001" oninput="applyFilters()" class="w-full p-2 border rounded border-gray-300">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">From Date</label>
                <input type="date" id="filter-start" onchange="applyFilters()" class="w-full p-2 border rounded border-gray-300">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">To Date</label>
                <input type="date" id="filter-end" onchange="applyFilters()" class="w-full p-2 border rounded border-gray-300">
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-800 text-white">
                        <th class="p-3 border">Student ID</th>
                        <th class="p-3 border">Date</th>
                        <th class="p-3 border">Reflection</th>
                    </tr>
                </thead>
                <tbody id="log-table-body" class="text-gray-700 italic">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // --- 1. FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyB9CvzJaTN9fY1MswFfSdZHY5iWx7qRR_g",
            authDomain: "reflection-log-3d328.firebaseapp.com",
            projectId: "reflection-log-3d328",
            storageBucket: "reflection-log-3d328.firebasestorage.app",
            messagingSenderId: "865378468498",
            appId: "1:865378468498:web:98c9ff8b919dc3b1575c4b",
        };;
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allLogs = []; // Stores data locally to allow instant filtering

        // --- 2. LOGIN LOGIC ---
        function checkAdmin() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === "Admin123") { // Set your own password here
                document.getElementById('admin-login').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                fetchAllLogs();
            } else {
                alert("Incorrect password!");
            }
        }

        // --- 3. FETCH DATA ---
        async function fetchAllLogs() {
            const snapshot = await db.collection('logs').orderBy('date', 'desc').get();
            allLogs = snapshot.docs.map(doc => doc.data());
            applyFilters();
        }

        // --- 4. FILTER & RENDER ---
        function applyFilters() {
            const filterId = document.getElementById('filter-id').value.toLowerCase();
            const start = document.getElementById('filter-start').value;
            const end = document.getElementById('filter-end').value;
            const tableBody = document.getElementById('log-table-body');

            tableBody.innerHTML = ""; // Clear table

            const filtered = allLogs.filter(log => {
                const matchId = log.studentId.toLowerCase().includes(filterId);
                const logDate = log.date; // Assuming YYYY-MM-DD format
                const matchStart = start ? logDate >= start : true;
                const matchEnd = end ? logDate <= end : true;
                return matchId && matchStart && matchEnd;
            });

            filtered.forEach(log => {
                const row = `
                    <tr class="hover:bg-gray-50 border-b transition">
                        <td class="p-3 border font-mono font-bold text-blue-600">${log.studentId}</td>
                        <td class="p-3 border whitespace-nowrap text-sm text-gray-500">${log.date}</td>
                        <td class="p-3 border">${log.text}</td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });

            // If empty
            if (filtered.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="3" class="p-10 text-center text-gray-400">No logs found for these filters.</td></tr>`;
            }
        }

        // --- 5. EXPORT ONLY FILTERED DATA ---
        function exportToCSV() {
            const filterId = document.getElementById('filter-id').value.toLowerCase();
            const start = document.getElementById('filter-start').value;
            const end = document.getElementById('filter-end').value;

            const filtered = allLogs.filter(log => {
                const matchId = log.studentId.toLowerCase().includes(filterId);
                const logDate = log.date;
                const matchStart = start ? logDate >= start : true;
                const matchEnd = end ? logDate <= end : true;
                return matchId && matchStart && matchEnd;
            });

            let csv = "Student ID,Date,Reflection\n";
            filtered.forEach(log => {
                // Wrap in quotes and handle existing quotes in text
                const row = `"${log.studentId}","${log.date}","${log.text.replace(/"/g, '""')}"\n`;
                csv += row;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `Filtered_Logs_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
