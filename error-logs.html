<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albert Reflection Log</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50 font-sans">

    <div id="login-screen" class="fixed inset-0 bg-blue-900 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-lg shadow-xl w-96 text-center">
            <h1 class="text-2xl font-bold mb-6 text-gray-800">Student Portal</h1>
            <input type="text" id="student-id" placeholder="Student ID" class="w-full p-2 mb-4 border rounded">
            <input type="password" id="passphrase" placeholder="Passphrase" class="w-full p-2 mb-6 border rounded">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Login</button>
        </div>
    </div>

    <div id="main-app" class="hidden max-w-4xl mx-auto p-6">
        <header class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold text-gray-800">Your Reflection History</h2>
            <button onclick="toggleView('form')" class="bg-green-600 text-white px-4 py-2 rounded shadow">+ New Log</button>
        </header>

        <div id="list-view" class="space-y-4">
            </div>

        <div id="form-view" class="hidden bg-white p-8 rounded-lg shadow-md border border-gray-200">
            <button onclick="toggleView('list')" class="text-blue-600 mb-4 inline-block">← Back to History</button>
            <h3 class="text-xl font-bold mb-6">Create New Reflection</h3>
            
            <form id="log-form">
                <label class="block mb-2 font-semibold">Question Difficulty</label>
                <select id="diff" class="w-full p-2 mb-4 border rounded">
                    <option value="EASY">🟢 EASY</option>
                    <option value="MODERATE">🟡 MODERATE</option>
                    <option value="DIFFICULT">🔴 DIFFICULT</option>
                </select>

                <label class="block mb-2 font-semibold">Why did you get this right/wrong? (Reflection)</label>
                <textarea id="logic" required class="w-full p-2 mb-4 border rounded h-24" placeholder="Explain your thought process..."></textarea>

                <label class="block mb-2 font-semibold">The "Future-Proof" Plan</label>
                <textarea id="fix" required class="w-full p-2 mb-4 border rounded h-24" placeholder="What will you keep in mind next time?"></textarea>

                <label class="block mb-2 font-semibold">The "Smartest" Trap</label>
                <textarea id="trap" required class="w-full p-2 mb-6 border rounded h-24" placeholder="Which wrong answer was the most tempting and how did you avoid it?"></textarea>

                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded font-bold hover:bg-blue-700">Submit Reflection</button>
            </form>
        </div>
    </div>

    <script>
    // Import the functions you need from the SDKs you need

    // TODO: Add SDKs for Firebase products that you want to use
    // https://firebase.google.com/docs/web/setup#available-libraries

    // Your web app's Firebase configuration
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
    const firebaseConfig = {
        apiKey: "AIzaSyB9CvzJaTN9fY1MswFfSdZHY5iWx7qRR_g",
        authDomain: "reflection-log-3d328.firebaseapp.com",
        projectId: "reflection-log-3d328",
        storageBucket: "reflection-log-3d328.firebasestorage.app",
        messagingSenderId: "865378468498",
        appId: "1:865378468498:web:98c9ff8b919dc3b1575c4b",
        measurementId: "G-1T1333RLS5"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentStudentId = "";

        // AUTH LOGIC
        async function handleLogin() {
            const id = document.getElementById('student-id').value;
            const pass = document.getElementById('passphrase').value;

            // Simple verification against a 'users' collection
            const userDoc = await db.collection('users').doc(id).get();
            if (userDoc.exists && userDoc.data().passphrase === pass) {
                currentStudentId = id;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                loadLogs();
            } else {
                alert("Invalid ID or Passphrase");
            }
        }

        // VIEW TOGGLE
        function toggleView(view) {
            document.getElementById('list-view').classList.toggle('hidden', view === 'form');
            document.getElementById('form-view').classList.toggle('hidden', view === 'list');
        }

        // LOAD LOGS
        async function loadLogs() {
            const listDiv = document.getElementById('list-view');
            listDiv.innerHTML = "Loading...";
            
            const snapshot = await db.collection('logs')
                .where('studentId', '==', currentStudentId)
                .orderBy('date', 'desc')
                .get();

            listDiv.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                const dateString = data.date.toDate().toLocaleDateString();
                const card = `
                    <div class="bg-white p-4 rounded border-l-4 ${getDiffColor(data.difficulty)} shadow-sm">
                        <div class="flex justify-between mb-2">
                            <span class="font-bold text-sm text-gray-500">${dateString}</span>
                            <span class="font-black text-xs">${data.difficulty}</span>
                        </div>
                        <p class="text-gray-800 mb-2"><strong>The Trap:</strong> ${data.trap}</p>
                        <p class="text-gray-600 italic text-sm">"Next time, I will ${data.fix}"</p>
                    </div>
                `;
                listDiv.insertAdjacentHTML('beforeend', card);
            });
        }

        function getDiffColor(diff) {
            if (diff === 'EASY') return 'border-green-500';
            if (diff === 'MODERATE') return 'border-yellow-500';
            return 'border-red-500';
        }

        // SUBMIT LOG
        document.getElementById('log-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newLog = {
                studentId: currentStudentId,
                date: firebase.firestore.Timestamp.now(),
                difficulty: document.getElementById('diff').value,
                logic: document.getElementById('logic').value,
                fix: document.getElementById('fix').value,
                trap: document.getElementById('trap').value
            };

            await db.collection('logs').add(newLog);
            document.getElementById('log-form').reset();
            toggleView('list');
            loadLogs();
        });

        // PREVENT COPY-PASTE IN REFLECTION BOXES
        document.addEventListener('DOMContentLoaded', () => {
            const textAreas = ['logic', 'fix', 'trap']; // The IDs of your textareas
            
            textAreas.forEach(id => {
                const element = document.getElementById(id);
                if (element) {
                    element.addEventListener('paste', (e) => {
                        e.preventDefault(); // This stops the paste action
                        alert("🚫 Reflection requires your own words! Please type your answer manually to ensure you're actually processing the info.");
                    });
                }
            });
        });
    </script>
</body>
</html>
